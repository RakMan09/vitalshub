spring:
  application:
    name: vitalshub
  profiles:
    default: dev

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

---
# Development / test profile: in-memory H2 (no Docker required).
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:vitalshub;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

---
# Production profile: PostgreSQL (see docker-compose.yml).
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vitalshub}
    username: ${DB_USER:vitalshub}
    password: ${DB_PASSWORD:vitalshub}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
